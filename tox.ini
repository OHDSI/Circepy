[tox]
envlist = py38, py39, py310, py311, py312
skip_missing_interpreters = true
isolated_build = true

[testenv]
deps =
    pytest>=7.0.0
    pytest-cov>=4.0.0
passenv =
    CI
    GITHUB_*
commands =
    pytest {posargs}

[gh-actions]
python =
    3.8: py38
    3.9: py39
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314
