name: basic tests

on:
  push:
    branches: [ develop, main ]   # Run on direct pushes to these branches
  pull_request:
    branches: [ develop, main ]   # Run on PRs targeting these branches

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.9", "3.10", "3.11", "3.12", "3.13", "3.14" ]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tox tox-gh-actions

      - name: Run tests with tox
        run: tox

      - name: Upload coverage to Codecov
        continue-on-error: true
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  wheel-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools

      - name: Build wheel
        run: python -m build

      - name: Smoke test installed wheel
        run: |
          python -m venv /tmp/circe-wheel-smoke
          /tmp/circe-wheel-smoke/bin/pip install dist/*.whl
          /tmp/circe-wheel-smoke/bin/circe --help
          /tmp/circe-wheel-smoke/bin/python -c "import circe; print(circe.__version__)"
