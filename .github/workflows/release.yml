name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags like v0.4.0, v0.4.1, etc.
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write  # Required for creating releases
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Get version from tag
        id: get_version
        run: |
          # Extract version from tag (remove 'v' prefix)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building release for version: $VERSION"
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine wheel setuptools
      
      - name: Build package
        run: |
          python -m build
          ls -lh dist/
      
      - name: Check package
        run: |
          twine check dist/*
      
      - name: Install package for testing
        run: |
          pip install dist/*.whl
      
      - name: Run quick verification tests
        run: |
          # Verify CLI works
          circe --help
          
          # Verify Python import
          python -c "from circe import __version__; print(f'Version: {__version__}')"
          
          # Verify version matches tag
          INSTALLED_VERSION=$(python -c "from circe import __version__; print(__version__)")
          if [ "$INSTALLED_VERSION" != "${{ steps.get_version.outputs.VERSION }}" ]; then
            echo "ERROR: Version mismatch! Tag: ${{ steps.get_version.outputs.VERSION }}, Installed: $INSTALLED_VERSION"
            exit 1
          fi
          echo "✓ Version verification passed"
      
      - name: Generate release notes
        id: release_notes
        run: |
          # Extract changelog for this version
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          
          # Create release notes from CHANGELOG.md
          if grep -q "## \[$VERSION\]" CHANGELOG.md; then
            awk "/## \[$VERSION\]/,/## \[/" CHANGELOG.md | sed '$d' > release_notes.md
          else
            echo "Release $VERSION" > release_notes.md
            echo "" >> release_notes.md
            echo "See [CHANGELOG.md](CHANGELOG.md) for details." >> release_notes.md
          fi
          
          # Add installation instructions
          echo "" >> release_notes.md
          echo "## Installation" >> release_notes.md
          echo "" >> release_notes.md
          echo "Download the wheel or source distribution from the assets below, or install from source:" >> release_notes.md
          echo "" >> release_notes.md
          echo "\`\`\`bash" >> release_notes.md
          echo "git clone https://github.com/azimov/circepy.git" >> release_notes.md
          echo "cd circepy" >> release_notes.md
          echo "git checkout v$VERSION" >> release_notes.md
          echo "pip install -e ." >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          
          cat release_notes.md
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, 'alpha') || contains(steps.get_version.outputs.VERSION, 'beta') || contains(steps.get_version.outputs.VERSION, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 90
